<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Licence globale presse · simulateur</title>
<style>
  :root{
    --base:#0f1116; --paper:#16191e; --bar:#13161b; --rail:#1b1f26;
    --surface:#21262e; --surface2:#2a2f39;
    --ink:#e7e5e0; --ink2:#aab0b8; --ink3:#7e848d;
    --line:#2a2e35; --line2:#3a3f48;
    --accent:#e0675a;
    --cert:#5fb98f; --cert-bg:#16302a;       /* sourcé  */
    --est:#d6a23e;  --est-bg:#332a16;         /* estimé  */
    --proj:#9aa0a8; --proj-bg:#262a30;        /* projection */
    --win:#4fae77; --loss:#e0675a; --loss-bg:#3a201d;
    --c-app:#5b8fd0; --c-new:#7fb3e6; --c-aud:#d6a23e; --c-ia:#9b7bc4; --c-ind:#6fa583;
    --tip-bg:#2c323a; --tip-fg:#f0eee9;
    --r:7px; --r2:11px;
    --fdisp:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --fsans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --fmono:ui-monospace,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
  }
  html{color-scheme:dark}
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:
      radial-gradient(900px 420px at 88% -8%,rgba(224,103,90,.07) 0%,transparent 62%),
      var(--base);
    color:var(--ink);font-family:var(--fsans);line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}
  .num{font-family:var(--fmono);font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer}
  a{color:inherit}

  /* ---- top bar ---- */
  .top{display:flex;align-items:center;gap:12px;padding:11px 20px;border-bottom:1px solid var(--line);
    position:sticky;top:0;background:rgba(19,22,27,.82);backdrop-filter:blur(8px);z-index:5}
  .brand{font-family:var(--fdisp);font-weight:600;font-size:16px;letter-spacing:-.01em}
  .brand b{color:var(--accent)}
  .toggle{display:flex;border:1px solid var(--line2);border-radius:var(--r);overflow:hidden;margin-left:4px}
  .toggle button{border:0;background:transparent;font-size:12.5px;padding:5px 13px;color:var(--ink2)}
  .toggle button.on{background:var(--ink);color:var(--paper)}
  .legend{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}

  .chip{font-size:10.5px;padding:2px 8px;border-radius:99px;font-weight:500;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;cursor:default}
  .chip.cert{background:var(--cert-bg);color:var(--cert)} .chip.est{background:var(--est-bg);color:var(--est)}
  .chip.proj{background:var(--proj-bg);color:var(--proj)}
  .dotk{width:8px;height:8px;border-radius:2px;display:inline-block;flex:none}

  /* ---- layout ---- */
  .wrap{display:grid;grid-template-columns:236px minmax(0,1fr);gap:0;max-width:1320px;margin:0;align-items:start}
  .rail{position:sticky;top:54px;align-self:start;padding:18px 16px;border-right:1px solid var(--line);min-height:calc(100vh - 54px);background:var(--rail)}
  .main{padding:20px 26px 70px;background:var(--paper)}

  /* ---- rail ---- */
  .rail h3{font-family:var(--fdisp);font-size:13px;font-weight:600;margin:0 0 4px}
  .rail .sub{font-size:11px;color:var(--ink3);margin:0 0 14px}
  .presets{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:18px}
  .preset{font-size:11px;padding:4px 9px;border:1px solid var(--line2);border-radius:99px;background:var(--surface);color:var(--ink2)}
  .preset.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .grp{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);margin:14px 0 9px;font-weight:600}
  .sl{margin-bottom:13px}
  .sl .lab{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;color:var(--ink2);margin-bottom:3px;gap:6px}
  .sl .val{font-family:var(--fmono);font-size:12px;color:var(--ink);font-weight:600}
  .sl input[type=range]{width:100%;accent-color:var(--accent);height:18px}
  .sl select{width:100%;font-size:12px;padding:5px 7px;border:1px solid var(--line2);border-radius:var(--r);background:var(--surface);color:var(--ink);font-family:inherit}
  .i{display:inline-flex;width:13px;height:13px;border:1px solid var(--line2);border-radius:50%;color:var(--ink3);
    font-size:9px;font-style:italic;align-items:center;justify-content:center;cursor:default;vertical-align:1px}
  /* Bulle d'aide CSS (remplace le title natif, lent et peu lisible) */
  [data-tip]{position:relative}
  [data-tip]:hover::after,[data-tip]:focus::after{
    content:attr(data-tip);position:absolute;left:50%;top:calc(100% + 8px);transform:translateX(-50%);
    width:max-content;max-width:240px;white-space:normal;text-align:left;text-transform:none;letter-spacing:normal;
    background:var(--tip-bg);color:var(--tip-fg);font-family:var(--fsans);font-size:11px;font-style:normal;font-weight:400;line-height:1.35;
    padding:7px 9px;border-radius:7px;box-shadow:0 8px 22px rgba(0,0,0,.5);z-index:50;pointer-events:none}
  [data-tip]:hover::before,[data-tip]:focus::before{
    content:"";position:absolute;left:50%;top:calc(100% + 3px);transform:translateX(-50%);
    border:5px solid transparent;border-bottom-color:var(--tip-bg);z-index:50;pointer-events:none}
  /* Près du bord droit : ancrer la bulle à droite pour éviter le débordement */
  .legend [data-tip]:hover::after,.legend [data-tip]:focus::after,
  th.r [data-tip]:hover::after,th.r [data-tip]:focus::after{left:auto;right:0;transform:none}
  .legend [data-tip]:hover::before,.legend [data-tip]:focus::before,
  th.r [data-tip]:hover::before,th.r [data-tip]:focus::before{left:auto;right:6px;transform:none}
  .railfoot{font-size:10.5px;color:var(--ink3);margin-top:20px;border-top:1px solid var(--line);padding-top:10px}

  /* ---- KPI cartouches ---- */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:8px}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r2);padding:13px 14px}
  .kpi .k{font-size:11px;color:var(--ink2)}
  .kpi .v{font-family:var(--fdisp);font-size:24px;font-weight:600;margin-top:4px;letter-spacing:-.01em}
  .kpi .v small{font-family:var(--fsans);font-size:11px;color:var(--ink3);font-weight:400}
  .delta{font-family:var(--fmono);font-size:12.5px;font-weight:600}
  .up{color:var(--win)} .down{color:var(--loss)}
  .tag-new{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--c-ia);font-weight:600}
  .kdis{font-size:10.5px;color:var(--ink2);margin-top:5px;display:flex;gap:10px;flex-wrap:wrap}
  .kdis .kd{display:inline-flex;align-items:center;gap:4px}

  .sech{font-family:var(--fdisp);font-size:16px;font-weight:600;margin:22px 0 10px;display:flex;align-items:center;gap:10px}
  .sech::after{content:"";flex:1;height:1px;background:var(--line)}

  /* ---- table marché ---- */
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{text-align:left;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);font-weight:600;padding:0 10px 7px}
  thead th.r,td.r{text-align:right}
  tbody tr{border-top:1px solid var(--line);cursor:pointer}
  tbody tr:hover{background:var(--surface)}
  td{padding:9px 10px;vertical-align:middle}
  td .nm{font-weight:500}
  td .fam{font-size:10.5px;color:var(--ink3)}
  .rk{color:var(--ink3);font-family:var(--fmono);font-size:12px;width:26px}
  .dbar{display:inline-flex;align-items:center;gap:8px;justify-content:flex-end}
  .dbar .t{width:74px;height:7px;background:var(--surface2);border-radius:99px;overflow:hidden;position:relative}
  .dbar .t i{position:absolute;top:0;bottom:0;display:block;border-radius:99px}
  .hint{font-size:11px;color:var(--ink3);margin:8px 2px 0}

  /* ---- fiche éditeur ---- */
  .crumb{font-size:12px;color:var(--ink3);margin:0 0 10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .crumb button{border:0;background:none;color:var(--accent);font-size:12px;padding:0;text-decoration:none}
  .edpick{font-family:inherit;font-size:12px;color:var(--ink);background:var(--surface);border:1px solid var(--line2);border-radius:var(--r);padding:3px 6px;max-width:260px}
  .ehead{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:14px}
  .ehead .h1{font-family:var(--fdisp);font-size:28px;font-weight:600;margin:0;letter-spacing:-.01em}
  .ehead .meta{font-size:12px;color:var(--ink2);margin-top:4px}
  .verdict{flex:none;text-align:center;border-radius:var(--r);padding:7px 13px;border:1px solid}
  .verdict .d{font-family:var(--fdisp);font-size:23px;font-weight:600;line-height:1}
  .verdict .l{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;display:block}
  .verdict.win{background:var(--cert-bg);border-color:var(--win)} .verdict.win .d,.verdict.win .l{color:var(--win)}
  .verdict.loss{background:var(--loss-bg);border-color:var(--loss)} .verdict.loss .d,.verdict.loss .l{color:var(--loss)}

  .cards2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:11px 13px}
  .card .k{font-size:11px;color:var(--ink2)} .card .v{font-family:var(--fdisp);font-size:21px;font-weight:600;margin-top:3px}

  .rb{display:grid;grid-template-columns:230px 1fr 60px;align-items:center;gap:10px;font-size:12.5px;margin-bottom:9px}
  .rb .l{display:flex;align-items:center;gap:7px}
  .rb .t{height:16px;background:var(--surface2);border-radius:var(--r);overflow:hidden}
  .rb .t i{display:block;height:100%;border-radius:var(--r)}
  .rb .a{text-align:right;font-weight:600;font-family:var(--fmono)}
  .rb.total .l{font-weight:600} .rb.total .a{font-weight:600}
  .rule{height:1px;background:var(--line);margin:2px 0 10px}

  .share{display:grid;grid-template-columns:210px 1fr 56px;align-items:center;gap:10px;font-size:12.5px;margin-bottom:8px}
  .share .l{color:var(--ink2);display:flex;align-items:center;gap:7px}
  .share .t{height:11px;background:var(--surface2);border-radius:99px;overflow:hidden}
  .share .t i{display:block;height:100%;border-radius:99px;background:var(--c-app)}
  .share .p{text-align:right;font-weight:600;font-family:var(--fmono)}

  .self{background:var(--surface);border:1px solid var(--line2);border-radius:var(--r);padding:14px;margin-top:6px}
  .self .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}
  .field label{font-size:11px;color:var(--ink2);display:flex;justify-content:space-between;gap:6px;align-items:center}
  .field input{width:100%;margin-top:4px;font-family:var(--fmono);font-size:14px;font-weight:600;border:1px solid var(--line2);
    border-radius:var(--r);padding:6px 8px;background:var(--surface);color:var(--ink)}
  .self .note{font-size:11px;color:var(--ink3);margin-top:11px;display:flex;gap:6px;align-items:flex-start}
  .self .note .tg{flex:none;background:var(--ink);color:var(--paper);border-radius:99px;font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:3px 7px;font-weight:600}
  .footnote{font-size:11px;color:var(--ink3);margin-top:16px}

  @media(max-width:820px){
    .wrap{grid-template-columns:1fr}
    .rail{position:static;min-height:0;border-right:0;border-bottom:1px solid var(--line)}
    .kpis{grid-template-columns:1fr 1fr}
    .rb{grid-template-columns:150px 1fr 56px}.share{grid-template-columns:140px 1fr 50px}
    .self .grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="top">
  <span class="brand">Licence globale <b>·</b> simulateur</span>
  <div class="toggle" id="toggle">
    <button data-v="marche">Marché</button>
    <button data-v="editeur">Éditeur</button>
  </div>
  <div class="legend">
    <span class="chip cert" data-tip="Donnée d'entrée sourcée publiquement (couche certaine)."><span class="dotk" style="background:var(--cert)"></span>sourcé</span>
    <span class="chip est" data-tip="Donnée d'entrée calculée par méthode ou posée en override documenté (couche estimation)."><span class="dotk" style="background:var(--est)"></span>estimé</span>
    <span class="chip proj" data-tip="Résultat de scénario (revenu projeté, Δ, parts) — ni certain ni estimé, sans couche."><span class="dotk" style="background:var(--proj)"></span>projection</span>
  </div>
</div>

<div class="wrap">
  <aside class="rail">
    <h3>Ton scénario</h3>
    <p class="sub">Les seuls éléments manipulables. Recalcul en direct.</p>
    <div class="presets" id="presets"></div>
    <div id="leviers"></div>
    <p class="railfoot">Modélisation figée v1.0 · l'appli est en lecture seule · les données changent par PR.</p>
  </aside>
  <main class="main" id="main"></main>
</div>

<script>
// Modèle « licence globale presse » — moteur de calcul.
// Module ES pur (aucune I/O) : utilisable tel quel par l'appli (navigateur) et par Node (scripts).
//
// Conventions de couches :
//   - certain    : valeur sourcée publiquement (data/certain/*)
//   - estimation : valeur calculée (cascade) ou override (data/estimation/*)
//   - hypothese  : levier de scénario (data/hypothese/hypotheses.json)
//   - resultat   : projection issue d'un scénario (n'est NI certaine NI estimée)
//
// Un « dataset » attendu :
//   { titres, sources, certain: {metrique:{_meta,valeurs}}, parametres, overrides, marche }

function num(v) {
  // Une valeur de fichier-métrique est soit un nombre, soit { valeur, ... }
  if (v == null) return null;
  return typeof v === "object" ? v.valeur : v;
}

function certainOf(dataset, metrique, id) {
  const f = dataset.certain[metrique];
  if (!f || !f.valeurs || !(id in f.valeurs)) return null;
  const raw = f.valeurs[id];
  return { valeur: num(raw), couche: "certain", source: (typeof raw === "object" && raw.source) || f._meta.source };
}

function overrideOf(dataset, metrique, id) {
  const f = dataset.overrides[metrique];
  if (!f || !(id in f)) return null;
  const o = f[id];
  return { valeur: o.valeur, couche: "estimation", methode: o.methode, confiance: o.confiance };
}

// ---- Résolution d'une valeur par titre (cascade + couche) ----------------

function resoudreAbonnes(dataset, id, famille) {
  const c = certainOf(dataset, "abonnes_num", id);
  if (c) return c;
  const o = overrideOf(dataset, "abonnes_num", id);
  if (o) return o;
  const diff = certainOf(dataset, "diffusion_payee", id);
  const fam = dataset.parametres.familles[famille];
  if (diff && fam) {
    return { valeur: Math.round(diff.valeur * fam.conv_diffusion_abonnes),
             couche: "estimation", methode: "diffusion_payee * conv_diffusion_abonnes", confiance: "faible" };
  }
  const def = dataset.parametres.abonnes_num.abonnes_defaut_par_famille[famille];
  if (def != null) {
    return { valeur: def, couche: "estimation", methode: "défaut famille", confiance: "faible" };
  }
  return { valeur: null, couche: "inconnu" };
}

function resoudreArpu(dataset, id, famille) {
  // ARPU abonnement mensuel ESTIMÉ (jamais un prix catalogue) : override sinon défaut de famille.
  const o = overrideOf(dataset, "arpu", id);
  if (o) return o;
  const fam = dataset.parametres.familles[famille];
  return { valeur: fam ? fam.arpu_defaut : null, couche: "estimation", methode: "ARPU défaut famille", confiance: "faible" };
}

// Visites mensuelles : certaines (ACPM) sinon estimées (abonnés × visites_par_abonné de la famille).
function resoudreVisites(dataset, id, famille, abonnes) {
  const c = certainOf(dataset, "visites", id);
  if (c) return c;
  const fam = dataset.parametres.familles[famille];
  const r = fam && fam.visites_par_abonne != null ? fam.visites_par_abonne : 0;
  return { valeur: (abonnes || 0) * r, couche: "estimation",
           methode: "abonnés × visites_par_abonné (famille)", confiance: "faible" };
}

// Pages vues mensuelles : certaines (ACPM) sinon estimées (visites résolues × pages_par_visite de la famille).
function resoudrePagesVues(dataset, id, famille, visites) {
  const c = certainOf(dataset, "pages_vues", id);
  if (c) return c;
  const fam = dataset.parametres.familles[famille];
  const r = fam && fam.pages_par_visite != null ? fam.pages_par_visite : 0;
  return { valeur: Math.round((visites || 0) * r), couche: "estimation",
           methode: "visites × pages_par_visite (famille)", confiance: "faible" };
}

// ---- Profil résolu d'un titre -------------------------------------------

function profilTitre(dataset, id) {
  const t = dataset.titres[id];
  const famille = t.famille;
  const abonnes = resoudreAbonnes(dataset, id, famille);
  const arpu = resoudreArpu(dataset, id, famille);
  const fam = dataset.parametres.familles[famille] || { inference_coef: 1 };
  const a = abonnes.valeur || 0;
  const visites = resoudreVisites(dataset, id, famille, a);
  const pagesVues = resoudrePagesVues(dataset, id, famille, visites.valeur);
  return {
    id, nom: t.nom, famille, groupe: t.groupe, pure_player: t.pure_player,
    abonnes, arpu, visites, pagesVues,
    revenuActuel: a * (arpu.valeur || 0) * 12,
    indiceInference: a * fam.inference_coef
  };
}

// Indice d'audience d'un titre selon la clé choisie (métrique ACPM réelle : visites ou pages vues).
function indiceAudience(profil, cleAudience) {
  const m = cleAudience === "pages_vues" ? profil.pagesVues : profil.visites;
  return (m && m.valeur) || 0;
}

// ---- Calcul d'un scénario -----------------------------------------------

function runModel(dataset, hypotheses) {
  const h = hypotheses;
  const cleAudience = h.cle_audience === "pages_vues" ? "pages_vues" : "visites";

  // Profils des titres connus
  const profils = Object.keys(dataset.titres).map((id) => profilTitre(dataset, id));

  // Longue traîne = résidu vs total marché certifié
  const totalAbonnementsConnus = profils.reduce((s, p) => s + (p.abonnes.valeur || 0), 0);
  const totalMarche = num(dataset.marche.total_abonnements_numeriques);
  const lt = dataset.parametres.longue_traine;
  const abonnesLT = Math.max(0, totalMarche - totalAbonnementsConnus);
  if (abonnesLT > 0) {
    profils.push({
      id: "longue-traine", nom: "Longue traîne (reste du marché)", famille: "longue-traine",
      groupe: "—", pure_player: false,
      abonnes: { valeur: abonnesLT, couche: "estimation", methode: "total marché - titres connus", confiance: "faible" },
      arpu: { valeur: lt.arpu_defaut, couche: "estimation", methode: "défaut longue traîne", confiance: "faible" },
      revenuActuel: abonnesLT * lt.arpu_defaut * 12,
      visites: { valeur: abonnesLT * (lt.visites_par_abonne || 0), couche: "estimation", methode: "longue traîne × visites_par_abonné", confiance: "faible" },
      pagesVues: { valeur: Math.round(abonnesLT * (lt.visites_par_abonne || 0) * (lt.pages_par_visite || 0)), couche: "estimation", methode: "longue traîne : visites × pages_par_visite", confiance: "faible" },
      indiceInference: abonnesLT * lt.inference_coef
    });
  }

  // Agrégats
  const dedup = dataset.parametres.conversions.dedoublonnage_abonnements_payeurs;
  const totalAbonnements = profils.reduce((s, p) => s + (p.abonnes.valeur || 0), 0);
  const payeursActuels = totalAbonnements / dedup;
  const revenuActuelTotal = profils.reduce((s, p) => s + p.revenuActuel, 0);

  // Périmètre du pass
  const payeursBundle = h.taux_migration * payeursActuels + h.net_new;
  const revenuBundle = payeursBundle * h.prix_pass * 12;

  // Pools
  const poolApporteur = h.part_apporteur * revenuBundle;
  const poolAudience = (1 - h.part_apporteur) * revenuBundle;
  const poolIA = h.enveloppe_ia;

  const sommeBase = totalAbonnements || 1;
  const sommeAudience = profils.reduce((s, p) => s + indiceAudience(p, cleAudience), 0) || 1;
  const sommeInference = profils.reduce((s, p) => s + p.indiceInference, 0) || 1;

  // Coexistence : les abonnés NON migrés continuent de payer leur abonnement individuel.
  const partNonMigree = 1 - h.taux_migration;

  const titres = profils.map((p) => {
    const partBase = (p.abonnes.valeur || 0) / sommeBase;            // force d'acquisition (apporteur)
    const partAudience = indiceAudience(p, cleAudience) / sommeAudience;
    const partInference = p.indiceInference / sommeInference;
    const revResiduel = partNonMigree * p.revenuActuel;             // abonnés restés en individuel
    const revApporteur = poolApporteur * partBase;
    const revAudience = poolAudience * partAudience;
    const revIA = poolIA * partInference;
    const revenuProjete = revResiduel + revApporteur + revAudience + revIA;
    const delta = p.revenuActuel > 0 ? revenuProjete / p.revenuActuel - 1 : null;
    return {
      id: p.id, nom: p.nom, famille: p.famille, groupe: p.groupe,
      abonnes: p.abonnes, arpu: p.arpu, visites: p.visites, pagesVues: p.pagesVues,
      cleAudience,
      revenuActuel: p.revenuActuel,
      revenuProjete,
      decomposition: { residuel: revResiduel, apporteur: revApporteur, audience: revAudience, ia: revIA },
      partInference, partAudience, partApporteur: partBase,
      delta
    };
  });

  titres.sort((a, b) => (b.abonnes.valeur || 0) - (a.abonnes.valeur || 0));

  const revenuResiduelTotal = partNonMigree * revenuActuelTotal;   // abonnements individuels maintenus
  const revenuTotal = revenuResiduelTotal + revenuBundle + poolIA;
  return {
    kpis: {
      revenuTotal,
      deltaRevenuTotal: revenuActuelTotal > 0 ? revenuTotal / revenuActuelTotal - 1 : null,
      payeurs: payeursBundle,
      deltaPayeurs: payeursActuels > 0 ? payeursBundle / payeursActuels - 1 : null,
      payeursPass: payeursBundle,                              // migrés + nouveaux (sur le pass)
      payeursIndividuel: partNonMigree * payeursActuels,       // non migrés (abonnement individuel)
      payeursTotal: payeursActuels + h.net_new,                // tous les payeurs du système
      deltaPayeursTotal: payeursActuels > 0 ? (payeursActuels + h.net_new) / payeursActuels - 1 : null,
      poolAbonnements: revenuBundle,
      poolIA,
      revenuResiduel: revenuResiduelTotal,
      revenuActuelTotal,
      payeursActuels
    },
    titres
  };
}

// Résout une hypothèse à partir d'un preset + surcharges éventuelles
function hypothesesDepuisScenario(dataset, nomScenario, surcharges = {}) {
  const hyp = dataset.hypotheses || {};
  const presets = hyp.scenarios || {};
  const base = presets[nomScenario] || presets[hyp.defaut] || {};
  return { ...base, ...surcharges };
}

/* =================== utils =================== */
const $ = (s,r=document)=>r.querySelector(s);
const fmtM = n => {
  const a = Math.abs(n);
  if (a >= 1e6) return (n/1e6).toLocaleString('fr-FR',{minimumFractionDigits:1,maximumFractionDigits:1})+' M€';
  if (a >= 1e3) return Math.round(n/1e3).toLocaleString('fr-FR')+' k€';
  return Math.round(n).toLocaleString('fr-FR')+' €';
};
const fmtInt = n => Math.round(n).toLocaleString('fr-FR');
const fmtPct = x => (x*100).toLocaleString('fr-FR',{minimumFractionDigits:1,maximumFractionDigits:1})+' %';
const fmtDelta = x => x==null ? '—' : (x>=0?'+':'')+(x*100).toFixed(0)+' %';
const esc = s => String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function provBadge(r){
  if(!r) return '';
  if(r.couche==='certain'){
    const src = DATASET.sources[r.source]; const t = src ? src.citation : (r.source||'source publique');
    return `<span class="chip cert" data-tip="${esc(t)}"><span class="dotk" style="background:var(--cert)"></span>sourcé</span>`;
  }
  const t = (r.methode||'estimation')+(r.confiance?` · confiance ${r.confiance}`:'');
  return `<span class="chip est" data-tip="${esc(t)}"><span class="dotk" style="background:var(--est)"></span>estimé</span>`;
}

/* =================== état =================== */
const LEVIERS = DATASET.hypotheses.leviers;
let state = hypothesesDepuisScenario(DATASET, DATASET.hypotheses.defaut);
let view = 'marche';          // 'marche' | 'editeur'
let currentEditeur = 'les-echos';
let localOverride = {};       // id -> {abonnes, arpu, visites}

/* lecture URL */
(function readURL(){
  const q = new URLSearchParams(location.search);
  const m = {p:'prix_pass',mig:'taux_migration',nn:'net_new',ap:'part_apporteur',ia:'enveloppe_ia'};
  for(const [k,key] of Object.entries(m)) if(q.has(k)) state[key]=parseFloat(q.get(k));
  if(q.has('cle')) state.cle_audience=q.get('cle');
  if(q.get('v')==='editeur'){ view='editeur'; if(q.get('t')) currentEditeur=q.get('t'); }
})();
function writeURL(){
  const q = new URLSearchParams();
  q.set('p',state.prix_pass); q.set('mig',state.taux_migration); q.set('nn',state.net_new);
  q.set('ap',state.part_apporteur); q.set('cle',state.cle_audience); q.set('ia',state.enveloppe_ia);
  q.set('v',view); if(view==='editeur') q.set('t',currentEditeur);
  history.replaceState(null,'',location.pathname+'?'+q.toString());
}

/* dataset effectif (avec overrides locaux « je suis cet éditeur ») */
function effectiveDataset(){
  if(!Object.keys(localOverride).length) return DATASET;
  const d = JSON.parse(JSON.stringify(DATASET));
  for(const [id,o] of Object.entries(localOverride)){
    if(o.abonnes!=null) d.certain.abonnes_num.valeurs[id]={valeur:o.abonnes,source:'saisie-editeur'};
    if(o.visites!=null) d.certain.visites.valeurs[id]={valeur:o.visites,source:'saisie-editeur'};
    if(o.pagesVues!=null) d.certain.pages_vues.valeurs[id]={valeur:o.pagesVues,source:'saisie-editeur'};
    if(o.arpu!=null){ d.overrides.arpu=d.overrides.arpu||{}; d.overrides.arpu[id]={valeur:o.arpu,methode:'saisie éditeur',confiance:'déclaré'}; }
  }
  d.sources['saisie-editeur']={citation:'Saisie locale de l\u2019éditeur (éphémère, non partagée)',acces:'local'};
  return d;
}

/* =================== rail =================== */
function buildRail(){
  // presets
  const pres = $('#presets'); pres.innerHTML='';
  Object.keys(DATASET.hypotheses.scenarios).filter(k=>k[0]!=='_').forEach(name=>{
    const b=document.createElement('button'); b.className='preset'; b.textContent=name[0].toUpperCase()+name.slice(1);
    b.onclick=()=>{ state=hypothesesDepuisScenario(DATASET,name); localOverride={}; buildRail(); render(); };
    pres.appendChild(b);
  });
  // leviers
  const host=$('#leviers'); host.innerHTML='';
  host.insertAdjacentHTML('beforeend','<p class="grp">Abonnés</p>');
  slider(host,'prix_pass',v=>v+' €'); slider(host,'taux_migration',v=>Math.round(v*100)+' %');
  slider(host,'net_new',v=>(v/1e6).toLocaleString('fr-FR',{maximumFractionDigits:1})+' M');
  slider(host,'part_apporteur',v=>Math.round(v*100)+' %'); selectCle(host);
  host.insertAdjacentHTML('beforeend','<p class="grp">Pool IA</p>');
  slider(host,'enveloppe_ia',v=>(v/1e6).toLocaleString('fr-FR')+' M€');
  // refléter preset actif
  markPreset();
}
function markPreset(){
  document.querySelectorAll('.preset').forEach(b=>{
    const sc=DATASET.hypotheses.scenarios[b.textContent.toLowerCase()];
    b.classList.toggle('on', sc && ['prix_pass','taux_migration','net_new','part_apporteur','enveloppe_ia','cle_audience'].every(k=>sc[k]===state[k]));
  });
}
function slider(host,key,fmt){
  const L=LEVIERS[key];
  const el=document.createElement('div'); el.className='sl';
  el.innerHTML=`<div class="lab"><span>${labelOf(key)}<span class="i" data-tip="${esc(L.aide)}">i</span></span><span class="val" id="v_${key}">${fmt(state[key])}</span></div>
    <input type="range" min="${L.min}" max="${L.max}" step="${L.pas}" value="${state[key]}">`;
  el.querySelector('input').oninput=e=>{ state[key]=parseFloat(e.target.value); $('#v_'+key).textContent=fmt(state[key]); markPreset(); render(); };
  host.appendChild(el);
}
function selectCle(host){
  const L=LEVIERS.cle_audience;
  const el=document.createElement('div'); el.className='sl';
  const CLE_LABELS={visites:'Visites',pages_vues:'Pages vues'};
  el.innerHTML=`<div class="lab"><span>Clé d'audience<span class="i" data-tip="${esc(L.aide)}">i</span></span></div>
    <select>${L.options.map(o=>`<option value="${o}" ${o===state.cle_audience?'selected':''}>${CLE_LABELS[o]||o.replace(/_/g,' ')}</option>`).join('')}</select>`;
  el.querySelector('select').onchange=e=>{ state.cle_audience=e.target.value; markPreset(); render(); };
  host.appendChild(el);
}
const LABELS={prix_pass:'Prix du pass',taux_migration:"Taux d'adoption",net_new:'Net-new payeurs',part_apporteur:"Part à l'apporteur",enveloppe_ia:'Enveloppe IA'};
const labelOf=k=>LABELS[k]||k;

/* =================== rendu =================== */
function render(){
  const res = runModel(effectiveDataset(), state);
  document.querySelectorAll('#toggle button').forEach(b=>b.classList.toggle('on',b.dataset.v===view));
  if(view==='marche') renderMarche(res); else renderEditeur(res);
  writeURL();
}

function renderMarche(res){
  const k=res.kpis;
  const dRev=k.deltaRevenuTotal, dPay=k.deltaPayeursTotal;
  const compactM=n=>(n/1e6).toLocaleString('fr-FR',{maximumFractionDigits:2})+' M';
  const titres=res.titres.filter(t=>t.id!=='longue-traine');
  const top=titres.slice(0,10);
  const maxAbs=Math.max(...top.map(t=>Math.abs(t.delta||0)),0.01);
  $('#main').innerHTML=`
    <div class="kpis">
      <div class="kpi"><div class="k">Revenu total <span class="i" data-tip="Revenu total = abonnements individuels maintenus + pool abonnements (pass) + pool IA ; Δ vs revenu d'abonnement actuel cumulé.">i</span></div><div class="v">${fmtM(k.revenuTotal)}</div>
        <div class="delta ${dRev>=0?'up':'down'}">${fmtDelta(dRev)} <small>vs aujourd'hui</small></div></div>
      <div class="kpi"><div class="k">Payeurs <span class="i" data-tip="Total des payeurs du système = payeurs actuels (dédoublonnés 1,27) + net-new. Dispatch : sur le pass (migrés + nouveaux) vs restés en abonnement individuel (non migrés).">i</span></div><div class="v">${fmtInt(k.payeursTotal)}</div>
        <div class="delta ${dPay>=0?'up':'down'}">${fmtDelta(dPay)} <small>vs aujourd'hui</small></div>
        <div class="kdis"><span class="kd"><span class="dotk" style="background:var(--c-app)"></span>${compactM(k.payeursPass)} pass</span><span class="kd"><span class="dotk" style="background:var(--c-ind)"></span>${compactM(k.payeursIndividuel)} individuel</span></div></div>
      <div class="kpi"><div class="k">Pool abonnements <span class="i" data-tip="Revenu du pass (payeurs × prix × 12), redistribué aux éditeurs via les pools apporteur et audience.">i</span></div><div class="v">${fmtM(k.poolAbonnements)}</div>
        <div class="delta" style="color:var(--ink3)">redistribué</div></div>
      <div class="kpi"><div class="k">Pool IA <span class="i" data-tip="Enveloppe IA (droits voisins) : revenu nouveau réparti à 100 % aux inférences, sans take rate — pas un % du pass.">i</span></div><div class="v">${fmtM(k.poolIA)}</div>
        <div class="tag-new">nouveau</div></div>
    </div>
    <div class="sech">Top 10 éditeurs — effet sur le revenu</div>
    <table><thead><tr><th></th><th>Titre</th><th class="r">Abonnés</th><th class="r">Δ revenu <span class="i" data-tip="Revenu projeté « licence globale » ÷ revenu d'abonnement actuel − 1. Projection de scénario, sans couche.">i</span></th></tr></thead>
    <tbody>${top.map((t,i)=>{
      const w=Math.abs(t.delta||0)/maxAbs*100, pos=(t.delta||0)>=0;
      return `<tr data-id="${t.id}">
        <td class="rk">${i+1}</td>
        <td><div class="nm">${esc(t.nom)}</div><div class="fam">${esc(t.famille)} · ${esc(t.groupe||'—')}</div></td>
        <td class="r"><span class="num">${fmtInt(t.abonnes.valeur||0)}</span> ${provBadge(t.abonnes)}</td>
        <td class="r"><span class="dbar"><span class="delta ${pos?'up':'down'}">${fmtDelta(t.delta)}</span>
          <span class="t"><i style="${pos?'left:50%':'right:50%'};width:${w/2}%;background:${pos?'var(--win)':'var(--loss)'}"></i></span></span></td>
      </tr>`;}).join('')}</tbody></table>
    <p class="hint">Clic sur un titre pour ouvrir sa fiche. Δ = revenu projeté « licence globale » vs revenu d'abonnement actuel. Survole un badge pour la source ou la méthode.</p>`;
  document.querySelectorAll('tbody tr').forEach(tr=>tr.onclick=()=>{ currentEditeur=tr.dataset.id; view='editeur'; localOverride={}; render(); });
}

function renderEditeur(res){
  const t=res.titres.find(x=>x.id===currentEditeur) || res.titres[0];
  currentEditeur=t.id;
  const k=res.kpis;
  // split apporteur migrants / net-new selon composition du pass (garde : 0/0 si aucun payeur)
  const denomPay=k.payeurs||1;
  const fracMig=(state.taux_migration*k.payeursActuels)/denomPay, fracNew=state.net_new/denomPay;
  const resid=t.decomposition.residuel||0;
  const vosAb=t.decomposition.apporteur*fracMig, netNew=t.decomposition.apporteur*fracNew;
  const aud=t.decomposition.audience, ia=t.decomposition.ia, tot=t.revenuProjete;
  const rows=[['Abonnements individuels maintenus',resid,'var(--c-ind)','Revenu des abonnés qui n’ont pas migré vers le pass et gardent leur abonnement individuel : (1 − migration) × revenu actuel.'],
              ['Vos abonnés migrés (part du pass)',vosAb,'var(--c-app)','Votre part du pool apporteur (mutualisé, réparti au prorata de votre base actuelle = force d’acquisition), pour la fraction du pass composée d’abonnés migrés.'],
              ['Net new payeurs que vous recrutez',netNew,'var(--c-new)','Votre part du pool apporteur (même clé : prorata de votre base actuelle), pour la fraction du pass composée de nouveaux payeurs recrutés.'],
              ['Revenus licence globale liés à votre audience',aud,'var(--c-aud)','Votre part du pool audience, répartie selon la clé active (visites ou pages vues).'],
              ['Droits voisins IA',ia,'var(--c-ia)','Votre part du pool IA, répartie selon l’indice d’inférence (notionnel, aucune donnée publique).']];
  const maxR=Math.max(...rows.map(r=>r[1]),1);
  const win=(t.delta||0)>=0;
  const segs=rows.map(r=>`<i style="width:${tot>0?r[1]/tot*100:0}%;background:${r[2]}"></i>`).join('');
  const visR=t.visites||{couche:'estimation'};
  const pvR=t.pagesVues||{couche:'estimation'};
  const audR=t.cleAudience==='pages_vues'?pvR:visR;
  const audLabel=t.cleAudience==='pages_vues'?'pages vues':'visites';
  const ov=localOverride[t.id]||{};
  $('#main').innerHTML=`
    <p class="crumb"><button id="back">‹ Marché</button> / <select id="ed_pick" class="edpick" title="Changer d'éditeur">${res.titres.filter(x=>x.id!=='longue-traine').slice().sort((a,b)=>a.nom.localeCompare(b.nom,'fr')).map(x=>`<option value="${x.id}" ${x.id===t.id?'selected':''}>${esc(x.nom)}</option>`).join('')}</select></p>
    <div class="ehead">
      <div><div class="h1">${esc(t.nom)}</div>
        <div class="meta">${esc(t.famille)} · ${esc(t.groupe||'—')} · <span class="num">${fmtInt(t.abonnes.valeur||0)}</span> abonnés numériques ${provBadge(t.abonnes)}</div></div>
      <div class="verdict ${win?'win':'loss'}"><span class="d num">${fmtDelta(t.delta)}</span><span class="l">${win?'gagnant':'perdant'}</span></div>
    </div>
    <div class="cards2">
      <div class="card"><div class="k">Revenu abonnement actuel</div><div class="v">${fmtM(t.revenuActuel)}<small style="font-size:11px;color:var(--ink3)">/an</small></div></div>
      <div class="card"><div class="k">Revenu projeté « licence globale »</div><div class="v">${fmtM(t.revenuProjete)} <span class="delta ${win?'up':'down'}" style="font-size:13px">${fmtDelta(t.delta)}</span></div></div>
    </div>
    <div class="sech">D'où viendraient vos revenus</div>
    <div class="rb total"><span class="l">Total projeté</span><span class="t" style="display:flex;height:18px">${segs}</span><span class="a">${fmtM(tot)}</span></div>
    <div class="rule"></div>
    ${rows.map(r=>`<div class="rb"><span class="l"><span class="dotk" style="background:${r[2]}"></span>${esc(r[0])}<span class="i" data-tip="${esc(r[3])}">i</span></span>
      <span class="t"><i style="width:${r[1]/maxR*100}%;background:${r[2]}"></i></span><span class="a">${fmtM(r[1])}</span></div>`).join('')}
    <div class="sech">Votre poids dans la répartition</div>
    ${shareRow('Part de la base abonnés',t.partApporteur,t.abonnes,'Part du titre dans la base d’abonnés totale ; clé du pool apporteur (force d’acquisition). Projection.')}
    ${shareRow('Part de l\u2019audience ('+audLabel+')',t.partAudience,audR,'Part du titre dans la cl\u00e9 d\u2019audience active ('+audLabel+') ; r\u00e9partit le pool audience. Projection.')}
    ${shareRow('Part des inférences IA',t.partInference,{couche:'estimation',methode:'indice notionnel (aucune donnée publique)'},'Part du titre dans l’indice d’inférence (abonnés × coef) ; indice notionnel, aucune donnée publique. Projection.')}
    <div class="sech">Je suis ${esc(t.nom)} — corriger avec mes chiffres</div>
    <div class="self">
      <div class="grid">
        <div class="field"><label>Abonnés numériques ${provBadge(t.abonnes)}</label><input id="in_ab" value="${ov.abonnes??(t.abonnes.valeur||'')}"></div>
        <div class="field"><label>ARPU réel (€/mois) ${provBadge(t.arpu)}</label><input id="in_arpu" value="${ov.arpu??(t.arpu.valeur||'')}"></div>
        <div class="field"><label>Visites / mois ${provBadge(visR)}</label><input id="in_vis" value="${ov.visites??(visR.valeur||'')}"></div>
        <div class="field"><label>Pages vues / mois <span class="i" data-tip="Métrique ACPM publique (Classement Unifié). Sert de clé d'audience alternative aux visites : un titre très engageant (pages/visite élevé) y pèse davantage. Estimée (visites × pages_par_visite famille) quand l'ACPM ne la publie pas.">i</span> ${provBadge(pvR)}</label><input id="in_pv" value="${ov.pagesVues??(pvR.valeur||'')}"></div>
      </div>
      <div class="note"><span class="tg">éphémère</span><span>Valeurs <b>locales</b> à votre session — jamais partagées ni écrites dans le dépôt. Elles remplacent nos estimations et recalculent la fiche en direct. Si vos vrais chiffres sont <b>sourçables publiquement</b>, ils peuvent être <b>committés au dépôt Git par une PR</b> : ils deviennent alors la valeur certaine partagée par tous (voir CONTRIBUTING.md).</span></div>
    </div>
    <p class="footnote">Δ, parts et revenu projeté sont des <b>projections de scénario</b> — ni certaines ni estimées. Les badges ● sourcé / ≈ estimé portent sur les données d'entrée ; au survol, leur source ou méthode.</p>`;
  $('#back').onclick=()=>{ view='marche'; render(); };
  $('#ed_pick').onchange=e=>{ currentEditeur=e.target.value; localOverride={}; render(); };
  const apply=()=>{ const o={}; const ab=parseNum($('#in_ab').value), ar=parseNum($('#in_arpu').value), vi=parseNum($('#in_vis').value), pv=parseNum($('#in_pv').value);
    if(ab) o.abonnes=ab; if(ar) o.arpu=ar; if(vi) o.visites=vi; if(pv) o.pagesVues=pv; localOverride[t.id]=o; render(); };
  ['in_ab','in_arpu','in_vis','in_pv'].forEach(id=>$('#'+id).addEventListener('change',apply));
}
function parseNum(s){ const n=parseFloat(String(s).replace(/[^0-9.,]/g,'').replace(',','.')); return isNaN(n)?null:n; }
function shareRow(label,part,resForBadge,aide){
  const info=aide?` <span class="i" data-tip="${esc(aide)}">i</span>`:'';
  return `<div class="share"><span class="l">${provBadge(resForBadge)} ${esc(label)}${info}</span>
    <span class="t"><i style="width:${Math.min(100,(part||0)*100*8)}%"></i></span>
    <span class="p">${fmtPct(part||0)}</span></div>`;
}

/* toggle */
document.querySelectorAll('#toggle button').forEach(b=>b.onclick=()=>{ view=b.dataset.v; render(); });

buildRail(); render();
</script>
</body>
</html>
