name: Déploiement GitHub Pages

# Valide les données, régénère docs/index.html (node app/build.js) et publie sur GitHub Pages.
# Réglage requis une fois : Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths: ["data/**", "model/**", "app/**", "scripts/**", ".github/workflows/deploy.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Valider les données (intégrité, sources, règle anti-source-payante)
        run: node scripts/validate.js
      - name: Construire l'appli (docs/index.html)
        run: node app/build.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deploy
        uses: actions/deploy-pages@v4
